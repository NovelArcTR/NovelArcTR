<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovelArc - Türkçe Light Novel Platformu</title>
    <meta name="description" content="Türkçe light novel, web novel ve manga çevirilerini ücretsiz okuyun">
    <meta name="theme-color" content="#1a1209">
    <base href="/">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1209;
            color: #f5eed8;
            line-height: 1.6;
        }
        
        /* Header */
        header {
            background: rgba(26, 18, 9, 0.95);
            border-bottom: 1px solid rgba(201, 146, 42, 0.2);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: #c9922a;
            text-decoration: none;
        }
        
        nav a {
            color: #f5eed8;
            text-decoration: none;
            margin-left: 2rem;
            transition: color 0.3s;
        }
        
        nav a:hover {
            color: #c9922a;
        }
        
        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        /* Home Page */
        .hero {
            text-align: center;
            padding: 3rem 0;
        }
        
        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #c9922a;
        }
        
        .hero p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }
        
        .novels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        
        .novel-card {
            background: rgba(201, 146, 42, 0.1);
            border: 1px solid rgba(201, 146, 42, 0.2);
            padding: 1.5rem;
            border-radius: 8px;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .novel-card:hover {
            background: rgba(201, 146, 42, 0.2);
            border-color: #c9922a;
            transform: translateY(-5px);
        }
        
        .novel-card h3 {
            color: #c9922a;
            margin-bottom: 0.5rem;
        }
        
        .novel-card p {
            font-size: 0.9rem;
            color: #d4c5a9;
        }
        
        /* Reader */
        .reader-content {
            background: rgba(201, 146, 42, 0.05);
            padding: 2rem;
            border-radius: 8px;
            margin: 2rem 0;
            line-height: 1.8;
        }
        
        /* Comments */
        .comments-section {
            margin-top: 2rem;
            border-top: 1px solid rgba(201, 146, 42, 0.2);
            padding-top: 2rem;
        }
        
        .comment-form {
            margin-bottom: 2rem;
        }
        
        .comment-form textarea {
            width: 100%;
            padding: 1rem;
            background: rgba(201, 146, 42, 0.1);
            border: 1px solid rgba(201, 146, 42, 0.2);
            color: #f5eed8;
            border-radius: 4px;
            min-height: 100px;
            font-family: inherit;
        }
        
        .comment {
            background: rgba(201, 146, 42, 0.05);
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 4px;
            border-left: 3px solid #c9922a;
        }
        
        .comment-author {
            font-weight: bold;
            color: #c9922a;
        }
        
        .comment-date {
            font-size: 0.85rem;
            color: #999;
        }
        
        /* Buttons */
        button, .btn {
            background: #c9922a;
            color: #1a1209;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        
        button:hover, .btn:hover {
            background: #d4a638;
            transform: scale(1.05);
        }
        
        /* Inputs */
        input, textarea {
            background: rgba(201, 146, 42, 0.1);
            border: 1px solid rgba(201, 146, 42, 0.2);
            color: #f5eed8;
            padding: 0.8rem;
            border-radius: 4px;
            font-family: inherit;
        }
        
        input::placeholder, textarea::placeholder {
            color: #999;
        }
        
        /* Error/Success Messages */
        #error-message {
            display: none;
            background: #d32f2f;
            color: white;
            padding: 1rem;
            margin: 1rem 0;
            border-radius: 4px;
            animation: slideDown 0.3s ease;
        }
        
        .success {
            background: #4caf50;
            color: white;
            padding: 1rem;
            margin: 1rem 0;
            border-radius: 4px;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Footer */
        footer {
            background: rgba(26, 18, 9, 0.95);
            border-top: 1px solid rgba(201, 146, 42, 0.2);
            padding: 2rem;
            text-align: center;
            margin-top: 3rem;
        }
        
        /* Hidden by default */
        .hidden {
            display: none;
        }
        
        /* Loading */
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }
            
            nav a {
                margin: 0.5rem;
            }
            
            .hero h1 {
                font-size: 2rem;
            }
            
            .novels-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-content">
            <a href="/" class="logo">📚 NovelArc</a>
            <nav>
                <a href="#" onclick="showHome(); return false;">Ana Sayfa</a>
                <a href="#" onclick="showNovels(); return false;">Romanlar</a>
                <a href="#" onclick="showProfile(); return false;">Profil</a>
                <a href="#" onclick="handleLogout(); return false;" id="logout-link" class="hidden">Çıkış</a>
                <a href="#" onclick="showLogin(); return false;" id="login-link">Giriş</a>
            </nav>
        </div>
    </header>

    <!-- Error Message -->
    <div id="error-message"></div>

    <!-- Main Content -->
    <div class="container">
        
        <!-- Home Page -->
        <div id="home-page" class="page">
            <div class="hero">
                <h1>Türkçe Light Novel Platformu</h1>
                <p>Binlerce romanı ücretsiz okuyun, toplulukla paylaşın</p>
                <button onclick="showNovels()">Romanları İncele</button>
            </div>
        </div>

        <!-- Novels Page -->
        <div id="novels-page" class="page hidden">
            <h2>Tüm Romanlar</h2>
            <div id="novels-grid" class="novels-grid"></div>
        </div>

        <!-- Reader Page -->
        <div id="reader-page" class="page hidden">
            <h2 id="reader-title">Roman Başlığı</h2>
            <p id="reader-author">Yazar</p>
            <div id="reader-content" class="reader-content"></div>
            <div class="comments-section">
                <h3>Yorumlar</h3>
                <div class="comment-form">
                    <textarea id="comment-text" placeholder="Bir yorum yazın..."></textarea>
                    <button onclick="submitComment()">Yorum Yaz</button>
                </div>
                <div id="comments-list"></div>
            </div>
            <button onclick="showNovels()">Geri Dön</button>
        </div>

        <!-- Profile Page -->
        <div id="profile-page" class="page hidden">
            <h2>Profilim</h2>
            <div id="profile-content"></div>
        </div>

        <!-- Login Form -->
        <div id="login-form" class="page hidden">
            <h2>Giriş Yap</h2>
            <div style="max-width: 400px; margin: 2rem auto;">
                <input type="email" id="login-email" placeholder="Email">
                <input type="password" id="login-password" placeholder="Şifre">
                <button onclick="handleLogin()" style="width: 100%; margin-top: 1rem;">Giriş Yap</button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 NovelArc - Türkçe Light Novel Platformu</p>
    </footer>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Main Application Script -->
    <script>
        // ═══════════════════════════════════════════════════════════════
        // NOVELARC - COMPLETE APPLICATION CODE
        // ═══════════════════════════════════════════════════════════════

        // Supabase Configuration
        const SUPABASE_URL = 'https://zrmxlldnvfbngzyquzmg.supabase.co'; // DOLDUR
        const SUPABASE_KEY = 'sb_publishable_cFQmfvAkTPfDbiDrCaQ7tA_CoLAWwAE'; // DOLDUR

        let supabase = null;
        let currentUser = null;
        let currentNovelId = null;

        // Initialize Supabase
        function initSupabase() {
            try {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                console.log('✓ Supabase bağlantısı başarılı');
                loadUser();
            } catch (error) {
                console.error('✗ Supabase bağlantısı hatası:', error);
                showError('Veritabanı bağlantısı başarısız');
            }
        }

        // ═══════════════════════════════════════════════════════════════
        // USER MANAGEMENT
        // ═══════════════════════════════════════════════════════════════

        async function loadUser() {
            try {
                const { data } = await supabase.auth.getSession();
                if (data.session) {
                    currentUser = data.session.user;
                    updateUserUI();
                }
            } catch (error) {
                console.error('User load error:', error);
            }
        }

        async function handleLogin() {
            try {
                const email = document.getElementById('login-email').value.trim();
                const password = document.getElementById('login-password').value;

                if (!email || !password) {
                    showError('Email ve şifre gerekli');
                    return;
                }

                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) throw error;

                currentUser = data.user;
                updateUserUI();
                showSuccess('Giriş başarılı!');
                showHome();
            } catch (error) {
                showError('Giriş hatası: ' + error.message);
            }
        }

        async function handleLogout() {
            try {
                await supabase.auth.signOut();
                currentUser = null;
                updateUserUI();
                showHome();
                showSuccess('Çıkış yapıldı');
            } catch (error) {
                showError('Çıkış hatası: ' + error.message);
            }
        }

        function updateUserUI() {
            const loginLink = document.getElementById('login-link');
            const logoutLink = document.getElementById('logout-link');

            if (currentUser) {
                loginLink.classList.add('hidden');
                logoutLink.classList.remove('hidden');
            } else {
                loginLink.classList.remove('hidden');
                logoutLink.classList.add('hidden');
            }
        }

        // ═══════════════════════════════════════════════════════════════
        // NOVELS MANAGEMENT
        // ═══════════════════════════════════════════════════════════════

        async function loadNovels() {
            try {
                const { data, error } = await supabase
                    .from('novels')
                    .select('*')
                    .limit(20);

                if (error) throw error;

                displayNovels(data || []);
            } catch (error) {
                showError('Romanlar yüklenemedi: ' + error.message);
            }
        }

        function displayNovels(novels) {
            const grid = document.getElementById('novels-grid');
            grid.innerHTML = '';

            if (novels.length === 0) {
                grid.innerHTML = '<p>Henüz roman yok</p>';
                return;
            }

            novels.forEach(novel => {
                const card = document.createElement('div');
                card.className = 'novel-card';
                card.onclick = () => readNovel(novel.id);
                card.innerHTML = `
                    <h3>${escapeHTML(novel.title)}</h3>
                    <p><strong>Yazar:</strong> ${escapeHTML(novel.author || 'Bilinmiyor')}</p>
                    <p>${escapeHTML(novel.description || '')}</p>
                    <p style="margin-top: 1rem; color: #999;">
                        Bölüm: ${novel.chapters_count || 0}
                    </p>
                `;
                grid.appendChild(card);
            });
        }

        async function readNovel(novelId) {
            try {
                const { data, error } = await supabase
                    .from('novels')
                    .select('*')
                    .eq('id', novelId)
                    .single();

                if (error) throw error;

                currentNovelId = novelId;
                document.getElementById('reader-title').textContent = data.title;
                document.getElementById('reader-author').textContent = data.author || 'Bilinmiyor';
                
                const content = data.content || 'İçerik yükleniyor...';
                document.getElementById('reader-content').textContent = content;

                loadComments(novelId);
                showPage('reader');
            } catch (error) {
                showError('Roman yüklenemedi: ' + error.message);
            }
        }

        // ═══════════════════════════════════════════════════════════════
        // COMMENTS MANAGEMENT
        // ═══════════════════════════════════════════════════════════════

        async function submitComment() {
            if (!currentUser) {
                showError('Yorum yazmak için giriş yapmalısınız');
                return;
            }

            try {
                const text = document.getElementById('comment-text').value.trim();

                if (!text) {
                    showError('Yorum boş olamaz');
                    return;
                }

                const { error } = await supabase.from('comments').insert([
                    {
                        novel_id: currentNovelId,
                        user_id: currentUser.id,
                        content: text,
                        created_at: new Date().toISOString()
                    }
                ]);

                if (error) throw error;

                document.getElementById('comment-text').value = '';
                showSuccess('Yorum başarıyla eklendi!');
                loadComments(currentNovelId);
            } catch (error) {
                showError('Yorum gönderilemedi: ' + error.message);
            }
        }

        async function loadComments(novelId) {
            try {
                const { data, error } = await supabase
                    .from('comments')
                    .select('*')
                    .eq('novel_id', novelId)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                displayComments(data || []);
            } catch (error) {
                console.error('Comments load error:', error);
            }
        }

        function displayComments(comments) {
            const list = document.getElementById('comments-list');
            list.innerHTML = '';

            if (comments.length === 0) {
                list.innerHTML = '<p>Henüz yorum yok. İlk yorum yapan siz olun!</p>';
                return;
            }

            comments.forEach(comment => {
                const div = document.createElement('div');
                div.className = 'comment';
                div.innerHTML = `
                    <p class="comment-author">${escapeHTML(comment.user_email || 'Anonim')}</p>
                    <p>${escapeHTML(comment.content)}</p>
                    <p class="comment-date">${new Date(comment.created_at).toLocaleDateString('tr-TR')}</p>
                `;
                list.appendChild(div);
            });
        }

        // ═══════════════════════════════════════════════════════════════
        // PAGE NAVIGATION
        // ═══════════════════════════════════════════════════════════════

        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => {
                p.classList.add('hidden');
            });
            document.getElementById(page + '-page').classList.remove('hidden');
        }

        function showHome() {
            showPage('home');
        }

        function showNovels() {
            loadNovels();
            showPage('novels');
        }

        function showProfile() {
            if (!currentUser) {
                showError('Profili görmek için giriş yapmalısınız');
                showLogin();
                return;
            }
            document.getElementById('profile-content').innerHTML = `
                <p><strong>Email:</strong> ${escapeHTML(currentUser.email)}</p>
                <p><strong>Üye olma tarihi:</strong> ${new Date(currentUser.created_at).toLocaleDateString('tr-TR')}</p>
            `;
            showPage('profile');
        }

        function showLogin() {
            showPage('login');
        }

        // ═══════════════════════════════════════════════════════════════
        // UTILITIES
        // ═══════════════════════════════════════════════════════════════

        function escapeHTML(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showError(message) {
            const el = document.getElementById('error-message');
            el.textContent = message;
            el.style.display = 'block';
            setTimeout(() => {
                el.style.display = 'none';
            }, 5000);
        }

        function showSuccess(message) {
            showError(message); // Aynı UI'yi kullan
        }

        // ═══════════════════════════════════════════════════════════════
        // INITIALIZATION
        // ═══════════════════════════════════════════════════════════════

        document.addEventListener('DOMContentLoaded', function() {
            console.log('✓ Sayfa yüklendi');
            initSupabase();
            showHome();
        });

        // ═══════════════════════════════════════════════════════════════
        // END OF CODE
        // ═══════════════════════════════════════════════════════════════
    </script>
</body>
</html>
